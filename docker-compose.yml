version: '3.8'

services:
  # =============================================================================
  # PostgreSQL Database with pgvector extension
  # =============================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: meetily-postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_USER: meetily
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meetily_secure_password_change_me}
      POSTGRES_DB: meetily
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    
    ports:
      - "5432:5432"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetily -d meetily"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    networks:
      - meetily-network
    
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # =============================================================================
  # Meetily Community+ Server
  # =============================================================================
  meetily-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: meetily-server
    restart: unless-stopped
    
    depends_on:
      postgres:
        condition: service_healthy
    
    environment:
      # Database
      DATABASE_URL: postgresql://meetily:${POSTGRES_PASSWORD:-meetily_secure_password_change_me}@postgres:5432/meetily
      MEETELY__DATABASE__URL: postgresql://meetily:${POSTGRES_PASSWORD:-meetily_secure_password_change_me}@postgres:5432/meetily
      
      # Server configuration
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      MEETELY__SERVER__HOST: 0.0.0.0
      MEETELY__SERVER__PORT: 8080
      
      # Logging
      RUST_LOG: ${RUST_LOG:-info}
      
      # Storage
      STORAGE_PATH: /var/meetily/recordings
      MEETELY__STORAGE__RECORDINGS_PATH: /var/meetily/recordings
      
      # API Keys (set these in .env file)
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      
      # Transcription config
      TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER:-nvidia}
      TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL:-parakeet-0.6b}
      
      # Summary config
      SUMMARY_PROVIDER: ${SUMMARY_PROVIDER:-openrouter}
      SUMMARY_MODEL: ${SUMMARY_MODEL:-meta-llama/llama-3.1-70b-instruct}
      
      # Embedding config
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-nvidia}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nvidia/nv-embedqa-e5-v5}
      
      # JWT Secret (for auth - Phase 13)
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_secure_random_string}
      MEETELY__AUTH__JWT_SECRET: ${JWT_SECRET:-change_this_to_a_secure_random_string}
    
    volumes:
      - recordings:/var/meetily/recordings
      - ./logs:/app/logs
    
    ports:
      - "8082:8080"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - meetily-network
    
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # =============================================================================
  # Ollama (Optional - for local LLMs)
  # Comment out if not using local models
  # =============================================================================
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: meetily-ollama
  #   restart: unless-stopped
  #   
  #   volumes:
