  #       reservations:
  #         memory: 4G
  #   
  #   # Uncomment for GPU support (NVIDIA)
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]

  # =============================================================================
  # Nginx Reverse Proxy (Optional - for production)
